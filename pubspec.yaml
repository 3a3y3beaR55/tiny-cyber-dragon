name: tiny_cyber_dragon
description: >-
  Tiny Cyber Dragon — a cybersecurity education platform for beginners.
  Built by TradeSpark Technologies under the Genesis Blueprint Protocol.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management — official TradeSpark standard (see docs/STATE_MANAGEMENT.md)
  flutter_riverpod: ^2.5.1

  # Declarative routing — StatefulShellRoute powers the desktop navigation shell
  go_router: ^14.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  image: ^4.5.2

flutter:
  uses-material-design: true

  assets:
    - assets/byte/idle/
    - assets/byte/fire/
    - assets/byte/scan/
    - assets/byte/effects/
    - assets/byte/hero/